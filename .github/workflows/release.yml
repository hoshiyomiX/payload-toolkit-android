name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build payload_toolkit.pyz
        run: python3 scripts/build_pyz.py

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle', 'android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
            gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Generate signing key for release
        run: |
          keytool -genkeypair \
            -keystore ci-keystore.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias release-key \
            -storepass release-store-pass \
            -keypass release-key-pass \
            -dname "CN=PayloadToolkit, OU=Release, O=PayloadToolkit, L=CI, ST=CI, C=US"

      - name: Build release APK (signed)
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -PciSigning=true \
            -PciKeystoreFile=../ci-keystore.jks \
            -PciKeystorePass=release-store-pass \
            -PciKeyAlias=release-key \
            -PciKeyPass=release-key-pass \
            --stacktrace 2>&1

      - name: List build outputs
        if: always()
        run: |
          echo "=== APK files ==="
          find android/app/build/outputs/apk -type f -name '*.apk' 2>/dev/null || echo "No APK files found"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: android/app/build/outputs/apk/release/
          if-no-files-found: error
          retention-days: 30

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            android/app/build/outputs/apk/release/*.apk
