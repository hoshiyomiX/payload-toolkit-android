name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target.label }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target:
          - { flavor: Arm7, abi: arm7, label: ARMv7 }
          - { flavor: Arm8, abi: arm8, label: ARMv8 }
          - { flavor: Universal, abi: universal, label: Universal }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build payload_toolkit.pyz
        run: python3 scripts/build_pyz.py

      - name: Prepare Python runtime
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq dpkg zip patchelf 2>/dev/null || true
          bash scripts/prepare_python_runtime.sh

      - name: Copy assets to Android
        run: |
          mkdir -p android/app/src/main/assets
          cp dist/payload_toolkit.pyz android/app/src/main/assets/
          cp dist/python-stdlib.zip android/app/src/main/assets/
          cp dist/native-libs-manifest.txt android/app/src/main/assets/

      - name: Generate signing key for release
        run: |
          keytool -genkeypair \
            -keystore ci-keystore.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias release-key \
            -storepass release-store-pass \
            -keypass release-key-pass \
            -dname "CN=PayloadToolkit, OU=Release, O=PayloadToolkit, L=CI, ST=CI, C=US"

      - name: Build release APK (signed)
        working-directory: android
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip -qo gradle-8.6-bin.zip
          ./gradle-8.6/bin/gradle :app:assemble${{ matrix.target.flavor }}Release \
            -PciSigning=true \
            -PciKeystoreFile=../ci-keystore.jks \
            -PciKeystorePass=release-store-pass \
            -PciKeyAlias=release-key \
            -PciKeyPass=release-key-pass \
            --no-daemon --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-${{ matrix.target.abi }}
          path: android/app/build/outputs/apk/**/release/*.apk
          if-no-files-found: warn
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: List collected APKs
        run: |
          echo "--- Collected artifacts ---"
          ls -lh artifacts/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/**/*.apk
