name: Build APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK (debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
            gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: List available Gradle tasks
        working-directory: android
        run: ./gradlew tasks --no-daemon 2>&1 | head -60

      - name: Build debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace --info 2>&1 | tail -100

      - name: List build outputs
        if: always()
        run: |
          echo "=== Full APK output tree ==="
          find android/app/build/outputs/apk -type f 2>/dev/null || echo "Directory not found"
          echo "=== Gradle build dir ==="
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug dir not found"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/
          if-no-files-found: error
          retention-days: 30

  build-release:
    name: Build APK (release, unsigned)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
            gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Generate debug signing key for CI
        run: |
          keytool -genkeypair \
            -keystore android/ci-keystore.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias ci-key \
            -storepass ci-store-pass \
            -keypass ci-key-pass \
            -dname "CN=CI, OU=CI, O=PayloadToolkit, L=CI, ST=CI, C=US"

      - name: Build release APK (unsigned)
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -PciSigning=true \
            -PciKeystoreFile=../ci-keystore.jks \
            -PciKeystorePass=ci-store-pass \
            -PciKeyAlias=ci-key \
            -PciKeyPass=ci-key-pass \
            --no-daemon --stacktrace
        env:
          CI_SIGNING_STORE_FILE: ../ci-keystore.jks
          CI_SIGNING_STORE_PASSWORD: ci-store-pass
          CI_SIGNING_KEY_ALIAS: ci-key
          CI_SIGNING_KEY_PASSWORD: ci-key-pass

      - name: List build outputs
        if: always()
        run: |
          echo "=== Full APK output tree ==="
          find android/app/build/outputs/apk -type f 2>/dev/null || echo "Directory not found"
          echo "=== Gradle build dir ==="
          ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release dir not found"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: android/app/build/outputs/apk/release/
          if-no-files-found: error
          retention-days: 7
