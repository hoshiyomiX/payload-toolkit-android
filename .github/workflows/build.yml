name: Build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare runtime
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build payload_toolkit.pyz
        run: python3 scripts/build_pyz.py

      - name: Prepare Python runtime
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq dpkg zip patchelf 2>/dev/null || true
          bash scripts/prepare_python_runtime.sh

      - name: Copy assets to Android
        run: |
          mkdir -p android/app/src/main/assets
          cp dist/payload_toolkit.pyz android/app/src/main/assets/
          cp dist/python-stdlib.zip android/app/src/main/assets/
          cp dist/native-libs-manifest.txt android/app/src/main/assets/
          echo "pyz: $(wc -c < dist/payload_toolkit.pyz) bytes"
          echo "stdlib: $(wc -c < dist/python-stdlib.zip) bytes"
          echo "manifest: $(wc -c < dist/native-libs-manifest.txt) bytes"
          echo "jniLibs/arm64-v8a:  $(ls android/app/src/main/jniLibs/arm64-v8a/*.so 2>/dev/null | wc -l) native libs"
          echo "jniLibs/armeabi-v7a: $(ls android/app/src/main/jniLibs/armeabi-v7a/*.so 2>/dev/null | wc -l) native libs"

      - name: Upload prepared assets
        uses: actions/upload-artifact@v4
        with:
          name: prepared-assets
          path: |
            dist/
            android/app/src/main/assets/
            android/app/src/main/jniLibs/
          retention-days: 1

  build:
    name: Build (${{ matrix.target.label }})
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target:
          - { flavor: Arm7, abi: arm7, label: ARMv7 }
          - { flavor: Arm8, abi: arm8, label: ARMv8 }
          - { flavor: Universal, abi: universal, label: Universal }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download prepared assets
        uses: actions/download-artifact@v4
        with:
          name: prepared-assets

      - name: Build release APK
        working-directory: android
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip -qo gradle-8.6-bin.zip
          ./gradle-8.6/bin/gradle :app:assemble${{ matrix.target.flavor }}Release --no-daemon --stacktrace

      - name: Build debug APK
        working-directory: android
        run: |
          ./gradle-8.6/bin/gradle :app:assemble${{ matrix.target.flavor }}Debug --no-daemon --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OTAku-${{ matrix.target.abi }}-release
          path: android/app/build/outputs/apk/**/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OTAku-${{ matrix.target.abi }}-debug
          path: android/app/build/outputs/apk/**/debug/*.apk
          if-no-files-found: warn
          retention-days: 30
