name: Build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build payload_toolkit.pyz
        run: python3 scripts/build_pyz.py

      - name: Copy .pyz to Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp dist/payload_toolkit.pyz android/app/src/main/assets/
          echo "Asset: $(wc -c < dist/payload_toolkit.pyz) bytes"

      - name: Build debug APK
        working-directory: android
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip -qo gradle-8.6-bin.zip
          ./gradle-8.6/bin/gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Build release APK
        working-directory: android
        run: |
          ./gradle-8.6/bin/gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Collect and upload APKs
        if: always()
        run: |
          mkdir -p artifacts
          echo "=== Scanning for APK files ==="
          find . -path '*/build/outputs/apk/*' -name '*.apk' -type f 2>/dev/null | while read f; do
            cp "$f" artifacts/
            echo "  $f ($(wc -c < "$f") bytes)"
          done
          echo ""
          echo "=== Artifacts to upload ==="
          ls -la artifacts/ || echo "  (none)"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-apks
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30
