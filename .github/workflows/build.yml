name: Build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pyz:
    name: Build payload_toolkit.pyz
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build .pyz zipapp
        run: python3 scripts/build_pyz.py

      - name: Verify .pyz
        run: |
          echo "=== File info ==="
          file dist/payload_toolkit.pyz
          ls -lh dist/payload_toolkit.pyz

      - name: Smoke test
        run: |
          python3 dist/payload_toolkit.pyz --version
          python3 dist/payload_toolkit.pyz --help

      - name: Create test images and run E2E test
        run: |
          mkdir -p /tmp/test_imgs
          dd if=/dev/urandom of=/tmp/test_imgs/system.img bs=1024 count=256 2>/dev/null
          dd if=/dev/zero of=/tmp/test_imgs/boot.img bs=1024 count=64 2>/dev/null

          python3 dist/payload_toolkit.pyz gen -i /tmp/test_imgs -o /tmp/test_payload.bin -c gzip
          python3 dist/payload_toolkit.pyz info -i /tmp/test_payload.bin

          mkdir -p /tmp/test_dump
          python3 dist/payload_toolkit.pyz dump -i /tmp/test_payload.bin -o /tmp/test_dump
          ls -la /tmp/test_dump/

      - name: Upload .pyz artifact
        uses: actions/upload-artifact@v4
        with:
          name: payload-toolkit-pyz
          path: dist/payload_toolkit.pyz
          if-no-files-found: error
          retention-days: 90
