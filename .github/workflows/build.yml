name: Build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build APK (debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-v3-${{ runner.os }}-${{ hashFiles('android/**/*.gradle', 'android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-v3-${{ runner.os }}-

      - name: Build payload_toolkit.pyz
        run: python3 scripts/build_pyz.py

      - name: Copy .pyz to Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp dist/payload_toolkit.pyz android/app/src/main/assets/

      - name: Build debug APK
        working-directory: android
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip -qo gradle-8.6-bin.zip
          ./gradle-8.6/bin/gradle :app:assembleDebug --no-daemon --stacktrace

      - name: List build outputs
        if: always()
        run: |
          echo "=== APK files ==="
          find android/app/build/outputs/apk -type f -name '*.apk' 2>/dev/null || echo "No APK files found"
          echo ""
          echo "=== Assets ==="
          ls -la android/app/src/main/assets/ 2>/dev/null || echo "No assets"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/
          if-no-files-found: error
          retention-days: 90

  build-release:
    name: Build APK (release, signed)
    runs-on: ubuntu-latest
    needs: build-apk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-v3-${{ runner.os }}-${{ hashFiles('android/**/*.gradle', 'android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-v3-${{ runner.os }}-

      - name: Build payload_toolkit.pyz
        run: python3 scripts/build_pyz.py

      - name: Copy .pyz to Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp dist/payload_toolkit.pyz android/app/src/main/assets/

      - name: Generate CI signing key
        run: |
          keytool -genkeypair \
            -keystore ci-keystore.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias ci-key \
            -storepass ci-store-pass \
            -keypass ci-key-pass \
            -dname "CN=CI, OU=CI, O=PayloadToolkit, L=CI, ST=CI, C=US"

      - name: Build release APK
        working-directory: android
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip -qo gradle-8.6-bin.zip
          ./gradle-8.6/bin/gradle :app:assembleRelease \
            -PciSigning=true \
            -PciKeystoreFile=../ci-keystore.jks \
            -PciKeystorePass=ci-store-pass \
            -PciKeyAlias=ci-key \
            -PciKeyPass=ci-key-pass \
            --no-daemon --rerun-tasks --stacktrace

      - name: List build outputs
        if: always()
        run: |
          echo "=== APK files ==="
          find android/app/build/outputs/apk -type f -name '*.apk' 2>/dev/null || echo "No APK files found"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/
          if-no-files-found: error
          retention-days: 7
