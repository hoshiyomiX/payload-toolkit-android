name: Release .pyz

on:
  push:
    tags:
      - 'pyz-v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release .pyz
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build payload_toolkit.pyz
        run: python3 scripts/build_pyz.py

      - name: Verify .pyz
        run: |
          ls -lh dist/payload_toolkit.pyz
          python3 dist/payload_toolkit.pyz --version

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/pyz-v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release payload_toolkit.pyz ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/payload_toolkit.pyz
