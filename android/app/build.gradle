// Chaquopy plugin applied from root buildscript classpath
// Android and Kotlin plugins applied from root buildscript classpath
apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: 'com.chaquo.python'

android {
    namespace 'com.hoshiyomi.payloadtoolkit'
    compileSdk 34

    defaultConfig {
        applicationId 'com.hoshiyomi.payloadtoolkit'
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName '1.0.0'

        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'

        // Chaquopy: embedded Python configuration
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    signingConfigs {
        if (project.hasProperty('ciSigning') && project.property('ciSigning') == 'true') {
            ci {
                storeFile file(findProperty('ciKeystoreFile') ?: 'ci-keystore.jks')
                storePassword findProperty('ciKeystorePass') ?: System.getenv('CI_SIGNING_STORE_PASSWORD') ?: ''
                keyAlias findProperty('ciKeyAlias') ?: System.getenv('CI_SIGNING_KEY_ALIAS') ?: 'ci-key'
                keyPassword findProperty('ciKeyPass') ?: System.getenv('CI_SIGNING_KEY_PASSWORD') ?: ''
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (project.hasProperty('ciSigning') && project.property('ciSigning') == 'true') {
                signingConfig signingConfigs.ci
            }
        }
        debug {
            minifyEnabled false
            debuggable true
            applicationIdSuffix '.debug'
            versionNameSuffix '-DEBUG'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        viewBinding true
        buildConfig true
    }

    packaging {
        resources {
            excludes += ['/META-INF/{AL2.0,LGPL2.1}']
        }
    }
}

chaquopy {
    defaultConfig {
        version '3.11'
        pip {
            // No external pip packages required — stdlib only
        }
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-livedata-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'androidx.activity:activity-ktx:1.8.2'
    implementation 'androidx.fragment:fragment-ktx:1.6.2'
    implementation 'androidx.documentfile:documentfile:1.0.1'
    implementation 'androidx.preference:preference-ktx:1.2.1'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
